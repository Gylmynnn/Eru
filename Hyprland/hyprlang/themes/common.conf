exec = gsettings set org.gnome.desktop.interface font-name 'Iosevka Nerd Font 10'
exec = gsettings set org.gnome.desktop.interface document-font-name 'Iosevka Nerd Font 10'
exec = gsettings set org.gnome.desktop.interface monospace-font-name 'Iosevka Nerd Font 10'
exec = gsettings set org.gnome.desktop.interface font-antialiasing 'rgba'
exec = gsettings set org.gnome.desktop.interface font-hinting 'full'
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"


